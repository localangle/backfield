[project]
name = "backfield-ai"
version = "0.1.0"
description = "Shared AI model configuration and usage helpers for Backfield"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "litellm>=1.55.0",
    "backfield-db",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backfield_ai"]
