[project]
name = "backfield-db"
version = "0.1.0"
description = "Backfield SQLModel models and Alembic migrations"
requires-python = ">=3.11"
dependencies = [
    "sqlmodel>=0.0.14",
    "sqlalchemy>=2.0.0",
    "psycopg[binary]>=3.1.0",
    "alembic>=1.13.0",
    "cryptography>=42.0.0",
    "geoalchemy2>=0.19.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backfield_db"]
