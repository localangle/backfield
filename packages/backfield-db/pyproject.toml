[project]
name = "backfield-db"
version = "0.1.0"
description = "Backfield SQLModel models and Alembic migrations (monorepo-internal)"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Private :: Do Not Upload",
]
dependencies = [
    "sqlmodel>=0.0.14",
    "sqlalchemy>=2.0.0",
    "psycopg[binary]>=3.1.0",
    "alembic>=1.13.0",
    "cryptography>=42.0.0",
    "geoalchemy2>=0.19.0",
    "pgvector>=0.3.0",
    "passlib[bcrypt]>=1.7.4",
    "bcrypt>=4.0.0,<5",
]

[project.urls]
Homepage = "https://github.com/localangle/backfield"
Repository = "https://github.com/localangle/backfield"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backfield_db"]
