[project]
name = "backfield-cli"
version = "0.1.0"
description = "Backfield operator CLI (migrate, init, and local stack helpers)"
requires-python = ">=3.11"
dependencies = [
    "backfield-db",
]

[project.scripts]
backfield = "backfield_cli.main:main"
backfield-migrate = "backfield_cli.migrate:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backfield_cli"]

[tool.uv.sources]
backfield-db = { workspace = true }
