[project]
name = "backfield-core"
version = "0.1.0"
description = "Agate graph types, node runtime, and execution"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "backfield-agate-runtime",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backfield_core"]
