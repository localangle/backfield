[project]
name = "backfield-auth"
version = "0.1.0"
description = "Shared session and service-token authentication for Backfield APIs"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "itsdangerous>=2.1.0",
    "backfield-db",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/backfield_auth"]
