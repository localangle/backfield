[project]
name = "backfield-workspace"
version = "0.1.0"
description = "Backfield monorepo (Agate + Stylebook)"
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "pytest>=8.0",
    "httpx>=0.27.0",
    "ruff>=0.6.0",
]

[tool.uv.workspace]
members = [
    "packages/backfield-core",
    "packages/backfield-agate-runtime",
    "packages/backfield-db",
    "apps/agate-api",
    "apps/worker",
    "apps/stylebook-api",
]

[tool.uv.sources]
backfield-core = { workspace = true }
backfield-agate-runtime = { workspace = true }
backfield-db = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["packages/backfield-core/tests", "tests"]
pythonpath = [
    "packages/backfield-core/src",
    "packages/backfield-agate-runtime/src",
    "packages/backfield-db/src",
    "apps/agate-api/src",
    "apps/worker/src",
    "apps/stylebook-api/src",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    "packages/backfield-db/alembic",
    "**/node_modules",
    "packages/backfield-agate-runtime",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
