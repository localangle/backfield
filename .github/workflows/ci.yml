name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Lint
        run: make lint
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/stylebook-ui/package-lock.json
      - name: Stylebook UI build
        run: make stylebook-ui-build
      - name: Build production API images
        run: |
          make docker-build-prod-apis \
            APP_VERSION=ci-test \
            GIT_SHA=${{ github.sha }} \
            BUILD_TIME=1970-01-01T00:00:00Z
      - name: Build production worker image
        run: |
          make docker-build-prod-worker \
            APP_VERSION=ci-test \
            GIT_SHA=${{ github.sha }} \
            BUILD_TIME=1970-01-01T00:00:00Z

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Test
        run: make test

  smoke:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Start runtime services
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ] && [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::CI smoke needs at least one repository secret: OPENAI_API_KEY or ANTHROPIC_API_KEY (Compose loads repo-root .env into agate-api/worker)."
            exit 1
          fi
          : > .env
          [ -n "${OPENAI_API_KEY:-}" ] && printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> .env
          [ -n "${ANTHROPIC_API_KEY:-}" ] && printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" >> .env
          docker compose -f infra/docker-compose.yml up -d --build postgres redis migrate stylebook-api core-api agate-api worker
      - name: Wait for API health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null \
              && curl -fsS http://localhost:8003/health >/dev/null \
              && curl -fsS http://localhost:8004/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f infra/docker-compose.yml logs
          exit 1
      - name: Bootstrap smoke user (fresh DB)
        run: |
          curl -fsS -X POST http://localhost:8004/v1/bootstrap/first-user \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke-ci@local.test","password":"smoke-ci-pass-change-in-prod"}' \
            || true
      - name: Fast smoke lanes
        env:
          SMOKE_EMAIL: smoke-ci@local.test
          SMOKE_PASSWORD: smoke-ci-pass-change-in-prod
        run: |
          make smoke-auth
          make smoke-agate-basic
          make smoke-stylebook-basic
      - name: Agate to Stylebook handoff smoke
        env:
          SMOKE_EMAIL: smoke-ci@local.test
          SMOKE_PASSWORD: smoke-ci-pass-change-in-prod
        run: make smoke
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v --remove-orphans

  smoke-extended:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Start runtime services
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          : > .env
          [ -n "${OPENAI_API_KEY:-}" ] && printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> .env
          [ -n "${ANTHROPIC_API_KEY:-}" ] && printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" >> .env
          docker compose -f infra/docker-compose.yml up -d --build postgres redis migrate stylebook-api core-api agate-api worker
      - name: Wait for API health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null \
              && curl -fsS http://localhost:8003/health >/dev/null \
              && curl -fsS http://localhost:8004/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f infra/docker-compose.yml logs
          exit 1
      - name: Bootstrap smoke user (fresh DB)
        run: |
          curl -fsS -X POST http://localhost:8004/v1/bootstrap/first-user \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke-ci@local.test","password":"smoke-ci-pass-change-in-prod"}' \
            || true
      - name: Extended smoke lanes
        env:
          SMOKE_EMAIL: smoke-ci@local.test
          SMOKE_PASSWORD: smoke-ci-pass-change-in-prod
        run: |
          make smoke-worker-async
          make smoke-stylebook-editorial
          make smoke-stylebook-import-export
          make smoke-s3-batch
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v --remove-orphans
