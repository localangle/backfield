name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Test
        run: make test

  smoke:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Start runtime services
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAPBOX_API_TOKEN: ${{ secrets.MAPBOX_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ] && [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::CI smoke needs at least one repository secret: OPENAI_API_KEY or ANTHROPIC_API_KEY (Compose loads repo-root .env into agate-api/worker)."
            exit 1
          fi
          : > .env
          [ -n "${OPENAI_API_KEY:-}" ] && printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY" >> .env
          [ -n "${ANTHROPIC_API_KEY:-}" ] && printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY" >> .env
          [ -n "${MAPBOX_API_TOKEN:-}" ] && printf 'MAPBOX_API_TOKEN=%s\n' "$MAPBOX_API_TOKEN" >> .env
          docker compose -f infra/docker-compose.yml up -d --build postgres redis stylebook-api core-api agate-api worker
      - name: Wait for API health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null \
              && curl -fsS http://localhost:8003/health >/dev/null \
              && curl -fsS http://localhost:8004/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f infra/docker-compose.yml logs
          exit 1
      - name: Bootstrap smoke user (fresh DB)
        run: |
          curl -fsS -X POST http://localhost:8004/v1/bootstrap/first-user \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke-ci@local.test","password":"smoke-ci-pass-change-in-prod"}' \
            || true
      # Session-shaped golden path (login → workspaces → project → run). Same script as make smoke.
      - name: Golden-path smoke
        env:
          SMOKE_EMAIL: smoke-ci@local.test
          SMOKE_PASSWORD: smoke-ci-pass-change-in-prod
        run: uv run python -u tests/smoke/golden_path_stack.py
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v --remove-orphans
