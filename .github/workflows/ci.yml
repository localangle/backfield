name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Test
        run: make test

  smoke:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Install workspace dependencies
        run: uv sync --all-packages
      - name: Start runtime services
        run: docker compose -f infra/docker-compose.yml up -d --build postgres redis stylebook-api agate-api worker
      - name: Wait for API health
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health >/dev/null && curl -fsS http://localhost:8003/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f infra/docker-compose.yml logs
          exit 1
      - name: Golden-path smoke
        run: make smoke
      - name: Dump compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs
      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v --remove-orphans
