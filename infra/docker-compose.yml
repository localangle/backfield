# Local-only Compose defaults. Ports bind to 127.0.0.1.
# Prefer secrets generated into repo-root `.env` by `backfield init`.
# Override SERVICE_API_TOKEN / SESSION_SECRET via `.env` or the environment when needed.
x-shared-env: &shared-env
  SERVICE_API_TOKEN: ${SERVICE_API_TOKEN:-backfield-dev}
  SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret}

# Runtime DB traffic goes through PgBouncer; migrations/admin use BACKFIELD_DATABASE_URL_DIRECT.
x-pooled-database-env: &pooled-database-env
  BACKFIELD_DATABASE_URL: postgresql+psycopg://postgres:postgres@pgbouncer:5432/backfield
  DATABASE_URL: postgresql+psycopg://postgres:postgres@pgbouncer:5432/backfield

services:
  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    image: backfield-postgres:16-3.4-pgvector
    environment:
      POSTGRES_DB: backfield
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres && psql -U postgres -d postgres -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: backfield
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MAX_DB_CONNECTIONS: 80
      # Postgres 16 uses SCRAM; md5/any break pgbouncer -> server auth.
      AUTH_TYPE: scram-sha-256
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: apps/agate-api/Dockerfile
      target: dev
    entrypoint: ["backfield-migrate"]
    environment:
      BACKFIELD_DATABASE_URL_DIRECT: postgresql+psycopg://postgres:postgres@postgres:5432/backfield
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  stylebook-api:
    build:
      context: ..
      dockerfile: apps/stylebook-api/Dockerfile
      target: dev
    env_file:
      - path: ../.env
        required: false
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      <<: [*shared-env, *pooled-database-env]
      UI_ORIGIN: http://localhost:5175
      REDIS_URL: redis://redis:6379/0
      BACKFIELD_SQLALCHEMY_POOL_SIZE: ${BACKFIELD_SQLALCHEMY_POOL_SIZE:-3}
      BACKFIELD_SQLALCHEMY_MAX_OVERFLOW: ${BACKFIELD_SQLALCHEMY_MAX_OVERFLOW:-2}
      BACKFIELD_PG_STATEMENT_TIMEOUT_MS: ${BACKFIELD_PG_STATEMENT_TIMEOUT_MS:-30000}
      BACKFIELD_PG_LOCK_TIMEOUT_MS: ${BACKFIELD_PG_LOCK_TIMEOUT_MS:-5000}
      # Same Fernet key as agate-api/worker/core-api (semantic search + catalog credential decrypt).
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-qhgUjRZ2WpPE9rP3viewNrKOmKQDvXbXzHCPxgrrZyI=}
      # STYLEBOOK_BUNDLE_* comes from env_file (../.env); do not set empty ${...} here or it
      # overrides env_file when host-side interpolation is unset.
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-api:
    build:
      context: ..
      dockerfile: apps/core-api/Dockerfile
      target: dev
    env_file:
      - path: ../.env
        required: false
    ports:
      - "127.0.0.1:8004:8004"
    environment:
      <<: [*shared-env, *pooled-database-env]
      UI_ORIGINS: http://localhost:5173,http://localhost:5175,http://localhost:5176,http://localhost:8004
      PLAYGROUND_ORIGIN: https://playground.backfield.news
      REDIS_URL: redis://redis:6379/0
      CELERY_QUEUE: agate
      BACKFIELD_SQLALCHEMY_POOL_SIZE: ${BACKFIELD_SQLALCHEMY_POOL_SIZE:-3}
      BACKFIELD_SQLALCHEMY_MAX_OVERFLOW: ${BACKFIELD_SQLALCHEMY_MAX_OVERFLOW:-2}
      BACKFIELD_PG_STATEMENT_TIMEOUT_MS: ${BACKFIELD_PG_STATEMENT_TIMEOUT_MS:-30000}
      BACKFIELD_PG_LOCK_TIMEOUT_MS: ${BACKFIELD_PG_LOCK_TIMEOUT_MS:-5000}
      # Same Fernet key as agate-api/worker for org integration secrets + project secrets (must match across services).
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-qhgUjRZ2WpPE9rP3viewNrKOmKQDvXbXzHCPxgrrZyI=}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=5)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agate-api:
        condition: service_healthy

  agate-api:
    build:
      context: ..
      dockerfile: apps/agate-api/Dockerfile
      target: dev
    env_file:
      - path: ../.env
        required: false
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      <<: [*shared-env, *pooled-database-env]
      UI_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379/0
      BACKFIELD_SQLALCHEMY_POOL_SIZE: ${BACKFIELD_SQLALCHEMY_POOL_SIZE:-3}
      BACKFIELD_SQLALCHEMY_MAX_OVERFLOW: ${BACKFIELD_SQLALCHEMY_MAX_OVERFLOW:-2}
      BACKFIELD_PG_STATEMENT_TIMEOUT_MS: ${BACKFIELD_PG_STATEMENT_TIMEOUT_MS:-30000}
      BACKFIELD_PG_LOCK_TIMEOUT_MS: ${BACKFIELD_PG_LOCK_TIMEOUT_MS:-5000}
      STYLEBOOK_API_URL: http://stylebook-api:8003
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-qhgUjRZ2WpPE9rP3viewNrKOmKQDvXbXzHCPxgrrZyI=}
      # After migrations: ensure the default local org/workspace/project. Provider credentials
      # should normally be configured in Settings; explicitly injected CI keys are still synced.
      BACKFIELD_LOCAL_BOOTSTRAP: ${BACKFIELD_LOCAL_BOOTSTRAP:-1}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 90s
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stylebook-api:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
      target: dev
    env_file:
      - path: ../.env
        required: false
    environment:
      <<: [*shared-env, *pooled-database-env]
      REDIS_URL: redis://redis:6379/0
      # One SQLAlchemy pool per Celery child process; keep defaults small so many workers
      # do not exhaust Postgres max_connections alongside agate-api / core-api / stylebook-api.
      BACKFIELD_SQLALCHEMY_POOL_SIZE: ${WORKER_BACKFIELD_SQLALCHEMY_POOL_SIZE:-1}
      BACKFIELD_SQLALCHEMY_MAX_OVERFLOW: ${WORKER_BACKFIELD_SQLALCHEMY_MAX_OVERFLOW:-0}
      CANONICAL_ADJUDICATION_MAX_CONCURRENT: ${CANONICAL_ADJUDICATION_MAX_CONCURRENT:-8}
      STYLEBOOK_API_URL: http://stylebook-api:8003
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-qhgUjRZ2WpPE9rP3viewNrKOmKQDvXbXzHCPxgrrZyI=}
      # STYLEBOOK_BUNDLE_* from env_file (../.env); avoid empty compose override (see stylebook-api).
      # Product-managed model and integration credentials are overlaid for each run.
      # Container credentials remain an operator/CI fallback.
      PROJECT_SLUG: ${PROJECT_SLUG:-}
      BACKFIELD_PARALLEL_GRAPH_LEVELS: ${BACKFIELD_PARALLEL_GRAPH_LEVELS:-1}
      OVERPASS_MAX_CONCURRENT: ${OVERPASS_MAX_CONCURRENT:-4}
      OVERPASS_QUERY_STAGGER_S: ${OVERPASS_QUERY_STAGGER_S:-0.5}
      TASK_SOFT_TIME_LIMIT: ${TASK_SOFT_TIME_LIMIT:-900}
      TASK_HARD_TIME_LIMIT: ${TASK_HARD_TIME_LIMIT:-1080}
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stylebook-api:
        condition: service_started
      agate-api:
        condition: service_healthy

  agate-ui:
    build:
      context: ..
      dockerfile: apps/agate-ui/Dockerfile
    # Must match apps/agate-ui/Dockerfile WORKDIR (/app/apps/agate-ui) so node_modules
    # from the image and the anonymous volume align; mounting only agate-ui at /app left
    # /app/node_modules empty (vite missing).
    working_dir: /app/apps/agate-ui
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      # Same-origin dev: browser calls /api/agate, /api/stylebook, and /v1 on :5173; Vite proxies.
      VITE_API_BASE: /api/agate
      VITE_AUTH_API_BASE: ""
      VITE_STYLEBOOK_API_BASE: /api/stylebook
      VITE_STYLEBOOK_API_PROXY_TARGET: http://stylebook-api:8003
      VITE_CORE_API_PROXY_TARGET: http://core-api:8004
      VITE_AGATE_API_PROXY_TARGET: http://agate-api:8000
      # Browser opens Stylebook on host :5175; Agate dev server is :5173.
      VITE_STYLEBOOK_UI_ORIGIN: http://localhost:5175
    volumes:
      - ../apps/agate-ui:/app/apps/agate-ui
      - ../packages:/app/packages
      - /app/apps/agate-ui/node_modules
      # Preserve image-built deps when packages/backfield-ui is bind-mounted.
      - /app/packages/backfield-ui/node_modules
    depends_on:
      core-api:
        condition: service_healthy
      agate-api:
        condition: service_healthy

  stylebook-ui:
    build:
      context: ..
      dockerfile: apps/stylebook-ui/Dockerfile
    # Must match apps/stylebook-ui/Dockerfile WORKDIR (/app/apps/stylebook-ui) so node_modules
    # from the image and the anonymous volume align; mounting only stylebook-ui at /app left
    # file:../../packages/backfield-ui unresolved (@backfield/ui import failure).
    working_dir: /app/apps/stylebook-ui
    ports:
      - "127.0.0.1:5175:5175"
    environment:
      # Same-origin dev: browser calls /v1, /api/agate, /api/stylebook on :5175; Vite proxies.
      VITE_AUTH_API_BASE: ""
      VITE_AGATE_API_BASE: /api/agate
      VITE_STYLEBOOK_API_BASE: /api/stylebook
      VITE_CORE_API_PROXY_TARGET: http://core-api:8004
      VITE_AGATE_API_PROXY_TARGET: http://agate-api:8000
      VITE_STYLEBOOK_API_PROXY_TARGET: http://stylebook-api:8003
      # Browser opens Agate on host :5173; Stylebook dev server is :5175.
      VITE_AGATE_UI_ORIGIN: http://localhost:5173
    volumes:
      - ../apps/stylebook-ui:/app/apps/stylebook-ui
      - ../packages:/app/packages
      - /app/apps/stylebook-ui/node_modules
      # Preserve image-built deps when packages/backfield-ui is bind-mounted.
      - /app/packages/backfield-ui/node_modules
    depends_on:
      core-api:
        condition: service_healthy
      agate-api:
        condition: service_healthy
      stylebook-api:
        condition: service_started

  api-playground:
    build:
      context: ..
      dockerfile: apps/api-playground/Dockerfile
    working_dir: /app/apps/api-playground
    ports:
      - "127.0.0.1:5176:5176"
    volumes:
      - ../apps/api-playground:/app/apps/api-playground
      - /app/apps/api-playground/node_modules
    depends_on:
      core-api:
        condition: service_healthy

volumes:
  postgres_data:
